<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Languages | LinguaCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
    <header class="bg-white border-b h-20 flex items-center px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-blue-600">LINGUACENTER</a>
            <nav class="flex gap-8 font-semibold uppercase text-sm tracking-widest">
                <a href="index.html">Home</a>
                <a href="languages.html" class="text-blue-600">Languages</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <h2 class="text-4xl font-black mb-12 italic uppercase">Our Languages</h2>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 group">
                <img src="assets/lang-english.jpg" class="w-full h-48 object-cover group-hover:scale-105 transition" alt="English">
                <div class="p-8">
                    <h3 class="text-2xl font-bold mb-4 uppercase">English</h3>
                    <p class="text-slate-600 text-sm mb-6">Master the global language for professional mastery.</p>
                    <button class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl uppercase">Enroll</button>
                </div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 group">
                <img src="assets/lang-spanish.jpg" class="w-full h-48 object-cover group-hover:scale-105 transition" alt="Spanish">
                <div class="p-8">
                    <h3 class="text-2xl font-bold mb-4 uppercase">Español</h3>
                    <p class="text-slate-600 text-sm mb-6">Unlock the culture and vibrancy of the Spanish world[cite: 10].</p>
                    <button class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl uppercase">Enroll</button>
                </div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 group">
                <img src="assets/lang-french.jpg" class="w-full h-48 object-cover group-hover:scale-105 transition" alt="French">
                <div class="p-8">
                    <h3 class="text-2xl font-bold mb-4 uppercase">Français</h3>
                    <p class="text-slate-600 text-sm mb-6">The language of diplomacy, art, and world gastronomy[cite: 10].</p>
                    <button class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl uppercase">Enroll</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
