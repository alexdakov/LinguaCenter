<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | LinguaCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
    <header class="bg-white border-b h-20 flex items-center px-6">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-blue-600">LINGUACENTER</a>
            <nav class="flex gap-8 font-semibold uppercase text-sm tracking-widest">
                <a href="index.html">Home</a>
                <a href="languages.html">Languages</a>
                <a href="about.html">About</a>
                <a href="contact.html" class="text-blue-600">Contact</a>
            </nav>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-24">
        <div class="bg-white p-12 rounded-3xl shadow-sm border border-slate-100">
            <h2 class="text-3xl font-black mb-6 italic uppercase">Get In Touch</h2>
            <form class="space-y-6">
                <input type="text" placeholder="Name" class="w-full bg-slate-50 p-4 rounded-xl outline-none border focus:border-blue-600">
                <input type="email" placeholder="Email" class="w-full bg-slate-50 p-4 rounded-xl outline-none border focus:border-blue-600">
                <textarea placeholder="Message" rows="4" class="w-full bg-slate-50 p-4 rounded-xl outline-none border focus:border-blue-600"></textarea>
                <button class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition uppercase italic">Send</button>
            </form>
        </div>
    </main>
</body>
</html>
