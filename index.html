<script>
const translations = {
    'en': {
        'nav_experience': 'The Experience',
        'nav_courses': 'Courses & Pricing',
        'nav_team': 'Our Team',
        'nav_contact': 'Contact',
        'enroll_btn': 'Enroll Now',
        'hero_title': 'Luminous Progress.',
        'hero_desc': 'Experience a boutique language journey where clarity meets minimalism.'
    },
    'bg': {
        'nav_experience': 'Преживяването',
        'nav_courses': 'Курсове и Цени',
        'nav_team': 'Нашият Екип',
        'nav_contact': 'Контакт',
        'enroll_btn': 'Запиши се',
        'hero_title': 'Светъл Прогрес.',
        'hero_desc': 'Изживейте бутиково езиково пътешествие, където яснотата среща минимализма.'
    },
    'ru': {
        'nav_experience': 'Опыт',
        'nav_courses': 'Курсы и Цены',
        'nav_team': 'Наша Команда',
        'nav_contact': 'Контакты',
        'enroll_btn': 'Записаться',
        'hero_title': 'Светлый Прогресс.',
        'hero_desc': 'Начните уникальное языковое путешествие, где ясность встречается с минимализмом.'
    }
};

function changeLanguage(lang) {
    document.querySelectorAll('[data-i18n]').forEach(element => {
        const key = element.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
            element.innerText = translations[lang][key];
        }
    });
    localStorage.setItem('lang', lang);
}

document.addEventListener('DOMContentLoaded', () => {
    const savedLang = localStorage.getItem('lang') || 'en';
    changeLanguage(savedLang);
});
</script>
