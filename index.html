<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaCenter | Unlock the World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function switchLanguage(lang) {
            const currentPage = window.location.pathname.split("/").pop() || "index.html";
            const path = lang === 'en' ? '' : '/' + lang;
            window.location.href = `${path}/${currentPage}`;
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <!-- Header design from Screenshot 2026-05-01 at 17.05.02.jpg -->
    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-blue-600">LINGUACENTER</a>
            <nav class="hidden md:flex gap-8 font-semibold uppercase text-sm tracking-widest">
                <a href="index.html" class="text-blue-600">Home</a>
                <a href="languages.html" class="hover:text-blue-600 transition">Languages</a>
                <a href="about.html" class="hover:text-blue-600 transition">About</a>
                <a href="contact.html" class="hover:text-blue-600 transition">Contact</a>
            </nav>
            <div class="flex items-center gap-3 border-l pl-6">
                <img src="https://flagicons.lipis.dev/flags/4x3/gb.svg" onclick="switchLanguage('en')" class="w-6 h-4 rounded shadow-sm cursor-pointer hover:scale-110 transition" alt="English">
                <img src="https://flagicons.lipis.dev/flags/4x3/es.svg" onclick="switchLanguage('es')" class="w-6 h-4 rounded shadow-sm cursor-pointer hover:scale-110 transition" alt="Spanish">
                <img src="https://flagicons.lipis.dev/flags/4x3/fr.svg" onclick="switchLanguage('fr')" class="w-6 h-4 rounded shadow-sm cursor-pointer hover:scale-110 transition" alt="French">
            </div>
        </div>
    </header>

    <!-- Hero Section design from Screenshot 2026-05-01 at 17.05.02.jpg -->
    <section class="relative h-[90vh] flex items-center justify-center">
        <img src="assets/home-hero.jpg" alt="Hero" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 bg-slate-900/60"></div>
        <div class="relative z-10 text-center px-4">
            <h1 class="text-6xl md:text-8xl font-black text-white mb-6 italic">UNLOCK THE WORLD</h1>
            <p class="text-xl text-slate-200 max-w-2xl mx-auto mb-10 italic">Premium language education tailored to your lifestyle.</p>
            <a href="languages.html" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-full font-bold transition shadow-xl uppercase">Explore Courses</a>
        </div>
    </section>
</body>
</html>
